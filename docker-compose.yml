version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payment_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=payment_calendar
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - FRONTEND_URL=http://localhost:5173
      - SANCTUM_STATEFUL_DOMAINS=localhost:5173,localhost,127.0.0.1
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payment_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
      - VITE_PROXY_TARGET=http://backend:8000
      - VITE_USE_MOCK=false
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: payment_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=payment_calendar
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: